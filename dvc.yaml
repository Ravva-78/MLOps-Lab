stages:
  process:
    cmd: python src/process_ratings.py
    deps:
      - data/raw/ratings.csv
      - src/process_ratings.py
    outs:
      - data/processed/ratings_clean.csv

  features:
    cmd: python src/create_features.py
    deps:
      - data/processed/ratings_clean.csv
      - src/create_features.py
    params:
      - train.n_estimators
    outs:
      - models/user_similarity.pkl

stages:
  load:
    cmd: python src/ingest.py
    deps:
      - data/raw/ratings.csv
      - src/ingest.py
      - src/config.py
    outs:
      - data/processed/ratings_clean.csv
    metrics:
      - evaluations/validation_report.json:
          cache: false      